version: '3.8'

services:
  # Service Discovery Registry
  service-registry:
    build:
      context: ../..
      dockerfile: docker/microservices/Dockerfile
      target: discovery
    container_name: elizoscog-service-registry
    ports:
      - "8001:8001"
    environment:
      - SERVICE_TYPE=registry
      - SERVICE_PORT=8001
      - CLEANUP_INTERVAL=60
      - SERVICE_TIMEOUT=30
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - elizoscog-mesh
    restart: unless-stopped

  # Load Balancer
  load-balancer:
    build:
      context: ../..
      dockerfile: docker/microservices/Dockerfile  
      target: loadbalancer
    container_name: elizoscog-load-balancer
    ports:
      - "8002:8002"
    environment:
      - SERVICE_TYPE=loadbalancer
      - SERVICE_PORT=8002
      - REGISTRY_URL=http://service-registry:8001
    depends_on:
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - elizoscog-mesh
    restart: unless-stopped

  # Service Orchestrator
  orchestrator:
    build:
      context: ../..
      dockerfile: docker/microservices/Dockerfile
      target: orchestrator
    container_name: elizoscog-orchestrator
    ports:
      - "8003:8003"
    environment:
      - SERVICE_TYPE=orchestrator
      - SERVICE_PORT=8003
      - REGISTRY_URL=http://service-registry:8001
      - HEALTH_CHECK_INTERVAL=30
    depends_on:
      service-registry:
        condition: service_healthy
      load-balancer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 60s
      timeout: 15s
      retries: 3
    networks:
      - elizoscog-mesh
    restart: unless-stopped

  # Financial Analysis Service
  financial-service:
    build:
      context: ../..
      dockerfile: docker/microservices/Dockerfile
      target: production
    container_name: elizoscog-financial-service
    ports:
      - "8010:8010"
    environment:
      - SERVICE_TYPE=financial
      - SERVICE_NAME=financial-analysis
      - SERVICE_PORT=8010
      - REGISTRY_URL=http://service-registry:8001
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    depends_on:
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - elizoscog-mesh
    restart: unless-stopped
    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /app/logs:noexec,nosuid,size=50m
      - /app/metrics:noexec,nosuid,size=50m
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
        reservations:
          memory: 512M
          cpus: "0.25"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # OpenCog Reasoning Service
  reasoning-service:
    build:
      context: ../..
      dockerfile: docker/microservices/Dockerfile
      target: production
    container_name: elizoscog-reasoning-service
    ports:
      - "8011:8011"
    environment:
      - SERVICE_TYPE=reasoning
      - SERVICE_NAME=cognitive-reasoning
      - SERVICE_PORT=8011
      - REGISTRY_URL=http://service-registry:8001
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    depends_on:
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - elizoscog-mesh
    restart: unless-stopped
    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
      - /app/logs:noexec,nosuid,size=100m
      - /app/metrics:noexec,nosuid,size=50m
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 1G
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # GGML ML Service
  ggml-service:
    build:
      context: ../..
      dockerfile: docker/microservices/Dockerfile
      target: ggml
    container_name: elizoscog-ggml-service
    ports:
      - "8012:8012"
    environment:
      - SERVICE_TYPE=ggml
      - SERVICE_NAME=ml-inference
      - SERVICE_PORT=8012
      - REGISTRY_URL=http://service-registry:8001
      - MODEL_TYPE=llama
      - QUANTIZATION=q4_0
      - CONTEXT_LENGTH=2048
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    depends_on:
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s
    networks:
      - elizoscog-mesh
    restart: unless-stopped
    # Security hardening for ML service
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:noexec,nosuid,size=500m
      - /app/model_cache:noexec,nosuid,size=1g
      - /app/inference_logs:noexec,nosuid,size=200m
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G
          cpus: "1.0"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 2

  # Envoy Proxy for Service Mesh
  envoy-proxy:
    image: envoyproxy/envoy:v1.28-latest
    container_name: elizoscog-envoy
    ports:
      - "10000:10000"  # Main listener
      - "9901:9901"    # Admin interface
    volumes:
      - ./configs/envoy.yaml:/etc/envoy/envoy.yaml:ro
    command: /usr/local/bin/envoy -c /etc/envoy/envoy.yaml
    depends_on:
      - service-registry
      - financial-service
      - reasoning-service
      - ggml-service
    networks:
      - elizoscog-mesh
    restart: unless-stopped

  # Traefik Alternative Proxy
  traefik-proxy:
    image: traefik:v3.0
    container_name: elizoscog-traefik
    ports:
      - "80:80"     # HTTP entrypoint
      - "8080:8080" # Traefik dashboard
    volumes:
      - ./configs/traefik-static.yml:/etc/traefik/traefik.yml:ro
      - ./configs/traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - service-registry
      - financial-service
      - reasoning-service
      - ggml-service
    networks:
      - elizoscog-mesh
    restart: unless-stopped
    profiles:
      - traefik

  # Security Scanner with Trivy
  security-scanner:
    image: aquasec/trivy:latest
    container_name: elizoscog-security-scanner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - security-reports:/reports
    environment:
      - TRIVY_CACHE_DIR=/tmp/trivy
      - TRIVY_DB_REPOSITORY=ghcr.io/aquasecurity/trivy-db
    command: >
      sh -c "
      echo 'Starting security scan...' &&
      trivy image --format json --output /reports/image-scan.json elizoscog-financial-service:latest 2>/dev/null || echo 'Image not found' &&
      trivy fs --format json --output /reports/filesystem-scan.json /app 2>/dev/null || echo 'FS scan skipped' &&
      echo 'Security scans completed'
      "
    networks:
      - elizoscog-mesh
    profiles:
      - security
      
  # Performance Testing Service
  performance-tester:
    image: python:3.12-slim
    container_name: elizoscog-performance-tester
    volumes:
      - ./configs/performance:/config:ro
      - performance-reports:/reports
    environment:
      - TARGET_HOST=load-balancer:8002
      - TEST_DURATION=60
      - CONCURRENT_USERS=50
    command: >
      sh -c "
      pip install --no-cache-dir requests locust &&
      echo 'Running performance tests...' &&
      locust --headless -u 50 -r 10 -t 60s --host=http://load-balancer:8002 -f /config/locustfile.py --html /reports/performance-report.html || echo 'Performance test completed'
      "
    depends_on:
      - load-balancer
    networks:
      - elizoscog-mesh
    profiles:
      - performance

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: elizoscog-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - elizoscog-mesh
    restart: unless-stopped
    profiles:
      - monitoring

  # Grafana for Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: elizoscog-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - elizoscog-mesh
    restart: unless-stopped
    profiles:
      - monitoring

networks:
  elizoscog-mesh:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  grafana-data:
  security-reports:
  performance-reports: