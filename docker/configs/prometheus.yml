global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "alert_rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Service Registry
  - job_name: 'service-registry'
    static_configs:
      - targets: ['service-registry:8001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Load Balancer
  - job_name: 'load-balancer'
    static_configs:
      - targets: ['load-balancer:8002']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Orchestrator
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['orchestrator:8003']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Financial Service
  - job_name: 'financial-service'
    static_configs:
      - targets: ['financial-service:8010']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Reasoning Service
  - job_name: 'reasoning-service'
    static_configs:
      - targets: ['reasoning-service:8011']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # GGML Service
  - job_name: 'ggml-service'
    static_configs:
      - targets: ['ggml-service:8012']
    metrics_path: '/metrics'
    scrape_interval: 60s

  # Envoy Proxy
  - job_name: 'envoy-proxy'
    static_configs:
      - targets: ['envoy-proxy:9901']
    metrics_path: '/stats/prometheus'
    scrape_interval: 15s

  # Traefik Proxy
  - job_name: 'traefik-proxy'
    static_configs:
      - targets: ['traefik-proxy:8080']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Docker containers
  - job_name: 'docker'
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container_name
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service_name